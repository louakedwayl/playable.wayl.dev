<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #111;
    font-family: system-ui, -apple-system, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    letter-spacing: -0.01em;
  }
  canvas { display: block; }

  .screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.4s ease;
  }

  #start-screen { background: #111; }
  #start-screen h1 {
    font-size: 38px; font-weight: 800; color: #e8e8e8;
    margin-bottom: 6px; letter-spacing: -0.02em;
  }
  #start-screen p {
    font-size: 14px; color: #555; margin-bottom: 36px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  #end-screen { background: rgba(0,0,0,0.92); display: none; }
  #end-screen .score-label {
    font-size: 13px; color: #555; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  #final-score {
    font-size: 64px; font-weight: 800; color: #e8e8e8;
    margin-bottom: 6px; letter-spacing: -0.03em;
  }
  #end-screen .subtitle { color: #444; font-size: 13px; margin-bottom: 32px; }

  .end-content {
    opacity: 0;
    transform: translateY(20px);
    display: flex; flex-direction: column; align-items: center;
  }
  .end-content.show {
    animation: fadeSlideUp 0.5s ease forwards;
  }
  @keyframes fadeSlideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .start-fade-out {
    opacity: 0 !important;
    pointer-events: none;
  }

  @keyframes borderPulse {
    0%, 100% { border-color: rgba(255,255,255,0.35); }
    50% { border-color: rgba(255,255,255,0.8); }
  }

  .btn-primary {
    padding: 14px 48px; font-size: 16px; font-weight: 800;
    border: 2px solid rgba(255,255,255,0.5); border-radius: 50px; cursor: pointer;
    background: transparent; color: #e8e8e8;
    letter-spacing: 0.08em; text-transform: uppercase;
    animation: borderPulse 2.5s ease-in-out infinite;
    transition: background 0.2s, color 0.2s;
  }
  .btn-primary:active {
    background: #e8e8e8; color: #111;
  }

  .btn-cta {
    padding: 14px 48px; font-size: 15px; font-weight: 800;
    border: 2px solid #e8e8e8; border-radius: 50px; cursor: pointer;
    background: #e8e8e8; color: #111;
    margin-bottom: 14px;
    letter-spacing: 0.08em; text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .btn-cta:active { opacity: 0.8; }

  .btn-secondary {
    padding: 10px 36px; font-size: 12px; font-weight: 700;
    border: 1px solid #444; border-radius: 50px;
    cursor: pointer; background: transparent; color: #555;
    letter-spacing: 0.08em; text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-secondary:active { border-color: #888; color: #888; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%; padding: 12px 16px;
    display: none; justify-content: space-between; align-items: center;
    z-index: 5;
  }
  #hud .score {
    font-size: 20px; font-weight: 800; color: #e8e8e8;
    letter-spacing: -0.02em;
  }
  #hud .progress-bar {
    flex: 1; height: 2px; margin: 0 12px;
    background: #1a1a1a; border-radius: 1px; overflow: hidden;
  }
  #hud .progress-fill {
    height: 100%; width: 0%; border-radius: 1px;
    background: #555; transition: width 0.3s;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="screen" id="start-screen">
  <h1 id="game-title">Stack</h1>
  <p id="game-subtitle">Tap to stack</p>
  <button class="btn-primary" id="play-btn">PLAY</button>
</div>

<div class="screen" id="end-screen">
  <div class="end-content" id="end-content">
    <div class="score-label">Your Score</div>
    <div id="final-score">0</div>
    <div class="subtitle">Can you beat this?</div>
    <button class="btn-cta" id="cta-btn">DOWNLOAD NOW</button>
    <button class="btn-secondary" id="retry-btn">PLAY AGAIN</button>
  </div>
</div>

<div id="hud">
  <div class="score" id="score-display">0</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<canvas id="game"></canvas>

<script>
// =====================================================================
// ENGINE — DO NOT MODIFY
// =====================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const STATE = { MENU: 0, PLAYING: 1, END: 2 };
let gameState = STATE.MENU;
let score = 0;
let elapsed = 0;
let lastTime = 0;

// Input
let input = { x: null, y: null, active: false, tapped: false };
canvas.addEventListener('touchstart', e => { e.preventDefault(); input.active = true; input.x = e.touches[0].clientX; input.y = e.touches[0].clientY; input.tapped = true; }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); input.x = e.touches[0].clientX; input.y = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); input.active = false; });
canvas.addEventListener('mousedown', e => { input.active = true; input.x = e.clientX; input.y = e.clientY; input.tapped = true; });
canvas.addEventListener('mousemove', e => { if (input.active) { input.x = e.clientX; input.y = e.clientY; } });
canvas.addEventListener('mouseup', () => { input.active = false; });
canvas.addEventListener('mouseleave', () => { input.active = false; });

// Screens
document.getElementById('play-btn').addEventListener('click', () => {
  const startScreen = document.getElementById('start-screen');
  startScreen.classList.add('start-fade-out');
  setTimeout(() => { startScreen.classList.add('hidden'); startScreen.classList.remove('start-fade-out'); }, 400);
  document.getElementById('hud').style.display = 'flex';
  gameState = STATE.PLAYING; score = 0; elapsed = 0;
  lastTime = performance.now(); initGame();
});
document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('end-content').classList.remove('show');
  document.getElementById('hud').style.display = 'flex';
  gameState = STATE.PLAYING; score = 0; elapsed = 0;
  lastTime = performance.now(); initGame();
});
document.getElementById('cta-btn').addEventListener('click', () => { alert('→ App Store redirect'); });

function endGame() {
  gameState = STATE.END;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('end-screen').style.display = 'flex';
  document.getElementById('final-score').textContent = score;
  requestAnimationFrame(() => {
    document.getElementById('end-content').classList.add('show');
  });
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  const progress = Math.min(100, (score / TAP_CONFIG.targetScore) * 100);
  document.getElementById('progress-fill').style.width = progress + '%';
}

// Particles
let particles = [];
function spawnParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 * i) / count;
    particles.push({ x, y, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3), life: 1, size: 3 });
  }
}
function updateParticles() { particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03; }); particles = particles.filter(p => p.life > 0); }
function drawParticles() { particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = '#bbb'; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); }); ctx.globalAlpha = 1; }

// Floating text
let floats = [];
function spawnFloat(x, y, text) { floats.push({ x, y, text, life: 1, vy: -2, scale: 1.3 }); }
function updateFloats() { floats.forEach(f => { f.y += f.vy; f.life -= 0.025; f.scale += (1 - f.scale) * 0.12; }); floats = floats.filter(f => f.life > 0); }
function drawFloats() {
  floats.forEach(f => {
    ctx.globalAlpha = f.life;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(f.scale, f.scale);
    ctx.fillStyle = '#e8e8e8';
    ctx.font = '800 26px system-ui';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '0.04em';
    ctx.fillText(f.text, 0, 0);
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

// Main loop
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05); lastTime = time;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  if (gameState === STATE.PLAYING) {
    elapsed += dt; updateGame(dt); updateParticles(); updateFloats(); updateHUD();
  }
  drawGame(); drawParticles(); drawFloats();
  input.tapped = false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// =====================================================================
// TAP MECHANIC — CONFIGURATION
// =====================================================================

const TAP_CONFIG = {
  targetScore: 15,              // Score to win
  blockWidth: 0.4,              // Block width as % of screen
  blockHeight: 30,              // Block height in pixels
  slideSpeed: 4,                // Block horizontal speed (pixels/frame)
  speedIncrease: 0.3,           // Speed increase per successful stack
  tolerance: 0.15,              // Alignment tolerance as % of block width (for "perfect")
  maxMisses: 3,                 // Misses before game over
};

// =====================================================================
// TAP STATE
// =====================================================================
let stack = [];
let currentBlock = null;
let direction = 1;
let currentSpeed = 0;
let misses = 0;
let dropping = [];
let perfectFlash = 0;

// =====================================================================
// RESKIN FUNCTIONS — CHANGE VISUALS HERE
// =====================================================================

/* RESKIN: Change stacked block appearance */
function drawBlock(x, y, w, h, alpha) {
  ctx.globalAlpha = alpha !== undefined ? alpha : 1;
  const bx = x - w / 2;
  const by = y - h / 2;

  // Depth shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(bx + 2, by + 3, w, h);

  // Main block fill — progressively lighter as tower grows
  const stackIndex = stack ? stack.indexOf(stack.find(b => Math.abs(b.x - x) < 1 && Math.abs(b.y - y) < 1)) : -1;
  const lift = stackIndex > 0 ? Math.min(stackIndex * 3, 30) : 0;
  const base = 0x77 + lift;
  const hex = Math.min(base, 0xaa).toString(16);
  ctx.fillStyle = '#' + hex + hex + hex;
  ctx.fillRect(bx, by, w, h);

  // Lighter top edge for 3D feel
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(bx, by, w, 2);

  // Thin stroke
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, w, h);

  ctx.globalAlpha = 1;
}

/* RESKIN: Change moving block appearance */
function drawMovingBlock(x, y, w, h) {
  const bx = x - w / 2;
  const by = y - h / 2;

  // Subtle glow beneath
  ctx.fillStyle = 'rgba(200,200,200,0.06)';
  ctx.fillRect(bx - 3, by - 3, w + 6, h + 6);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(bx + 2, by + 3, w, h);

  // Main fill — brighter
  ctx.fillStyle = '#aaa';
  ctx.fillRect(bx, by, w, h);

  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(bx, by, w, 2);

  // Stroke
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, w, h);
}

/* RESKIN: Change dropped/cut piece appearance */
function drawDroppingPiece(x, y, w, h, alpha) {
  ctx.globalAlpha = alpha;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x + 2, y + 3, w, h);

  // Block
  ctx.fillStyle = '#555';
  ctx.fillRect(x, y, w, h);

  // Top edge
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(x, y, w, 2);

  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);

  ctx.globalAlpha = 1;
}

/* RESKIN: Change base platform appearance */
function drawBase(x, y, w, h) {
  const bx = x - w / 2;
  const by = y - h / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(bx + 2, by + 3, w, h);

  // Main
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by, w, h);

  // Top edge highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(bx, by, w, 2);
}

/* RESKIN: Change guide lines appearance */
function drawGuides(x, w) {
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(x - w / 2, 0); ctx.lineTo(x - w / 2, H);
  ctx.moveTo(x + w / 2, 0); ctx.lineTo(x + w / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);
}

// =====================================================================
// CORE LOGIC
// =====================================================================

function getBlockWidth() {
  return W * TAP_CONFIG.blockWidth;
}

function createMovingBlock() {
  const topBlock = stack[stack.length - 1];
  currentSpeed = TAP_CONFIG.slideSpeed + stack.length * TAP_CONFIG.speedIncrease;
  direction = 1;
  currentBlock = {
    x: -getBlockWidth() / 2,
    y: topBlock.y - TAP_CONFIG.blockHeight,
    w: topBlock.w,
    h: TAP_CONFIG.blockHeight,
  };
}

function placeBlock() {
  if (!currentBlock) return;

  const top = stack[stack.length - 1];
  const overlap = calculateOverlap(currentBlock, top);

  if (overlap <= 0) {
    // Complete miss
    misses++;
    dropping.push({ x: currentBlock.x - currentBlock.w / 2, y: currentBlock.y - currentBlock.h / 2, w: currentBlock.w, h: currentBlock.h, vy: 0, life: 1 });
    if (misses >= TAP_CONFIG.maxMisses) {
      endGame();
      return;
    }
    createMovingBlock();
    return;
  }

  // Calculate new block position and width
  const newW = overlap;
  const newX = overlapCenter(currentBlock, top);

  // Drop the cut piece
  const cutW = currentBlock.w - newW;
  if (cutW > 1) {
    const cutX = currentBlock.x > top.x ? newX + newW / 2 : newX - newW / 2 - cutW;
    dropping.push({ x: cutX, y: currentBlock.y - currentBlock.h / 2, w: cutW, h: currentBlock.h, vy: 0, life: 1 });
  }

  // Check for perfect placement
  const perfectThreshold = currentBlock.w * TAP_CONFIG.tolerance;
  const isPerfect = Math.abs(currentBlock.x - top.x) < perfectThreshold;

  // Add to stack
  const placed = {
    x: isPerfect ? top.x : newX,
    y: currentBlock.y,
    w: isPerfect ? top.w : newW,
    h: currentBlock.h,
  };
  stack.push(placed);
  score++;

  spawnParticles(placed.x, placed.y, isPerfect ? 16 : 6);
  if (isPerfect) {
    spawnFloat(placed.x, placed.y - 30, 'PERFECT');
    perfectFlash = 1;
  }
  else spawnFloat(placed.x, placed.y - 30, '+1');

  if (score >= TAP_CONFIG.targetScore) {
    endGame();
    return;
  }

  createMovingBlock();
}

function calculateOverlap(block, target) {
  const bL = block.x - block.w / 2;
  const bR = block.x + block.w / 2;
  const tL = target.x - target.w / 2;
  const tR = target.x + target.w / 2;
  return Math.max(0, Math.min(bR, tR) - Math.max(bL, tL));
}

function overlapCenter(block, target) {
  const bL = block.x - block.w / 2;
  const bR = block.x + block.w / 2;
  const tL = target.x - target.w / 2;
  const tR = target.x + target.w / 2;
  const oL = Math.max(bL, tL);
  const oR = Math.min(bR, tR);
  return (oL + oR) / 2;
}

// =====================================================================
// TEMPLATE FUNCTIONS — FILLED FOR TAP/STACK
// =====================================================================

function initGame() {
  particles = []; floats = []; dropping = [];
  misses = 0;
  currentSpeed = TAP_CONFIG.slideSpeed;
  direction = 1;
  perfectFlash = 0;

  const baseW = getBlockWidth();
  const baseY = H * 0.75;

  stack = [{
    x: W / 2,
    y: baseY,
    w: baseW,
    h: TAP_CONFIG.blockHeight,
  }];

  createMovingBlock();
}

function updateGame(dt) {
  if (!currentBlock) return;

  // Move block horizontally
  currentBlock.x += currentSpeed * direction;

  // Bounce off edges
  if (currentBlock.x + currentBlock.w / 2 > W) {
    currentBlock.x = W - currentBlock.w / 2;
    direction = -1;
  }
  if (currentBlock.x - currentBlock.w / 2 < 0) {
    currentBlock.x = currentBlock.w / 2;
    direction = 1;
  }

  // Handle tap
  if (input.tapped) {
    placeBlock();
  }

  // Update dropping pieces
  dropping.forEach(d => {
    d.vy += 0.3;
    d.y += d.vy;
    d.life -= 0.015;
  });
  dropping = dropping.filter(d => d.life > 0 && d.y < H + 50);

  // Decay perfect flash
  if (perfectFlash > 0) {
    perfectFlash -= 0.06;
    if (perfectFlash < 0) perfectFlash = 0;
  }

  // Camera: shift everything down if stack gets too high
  const topY = stack[stack.length - 1].y;
  const targetCamY = H * 0.4;
  if (topY < targetCamY) {
    const shift = (targetCamY - topY) * 0.05;
    stack.forEach(b => b.y += shift);
    if (currentBlock) currentBlock.y += shift;
    dropping.forEach(d => d.y += shift);
  }
}

function drawGame() {
  // Guide lines for top block
  if (stack.length > 0) {
    const top = stack[stack.length - 1];
    drawGuides(top.x, top.w);
  }

  // Draw base
  if (stack.length > 0) {
    drawBase(stack[0].x, stack[0].y, stack[0].w, stack[0].h);
  }

  // Draw stack
  for (let i = 1; i < stack.length; i++) {
    const b = stack[i];
    drawBlock(b.x, b.y, b.w, b.h);
  }

  // Perfect flash overlay on top block
  if (perfectFlash > 0 && stack.length > 1) {
    const top = stack[stack.length - 1];
    ctx.globalAlpha = perfectFlash * 0.6;
    ctx.fillStyle = '#fff';
    ctx.fillRect(top.x - top.w / 2, top.y - top.h / 2, top.w, top.h);
    ctx.globalAlpha = 1;
  }

  // Draw moving block
  if (currentBlock && gameState === STATE.PLAYING) {
    drawMovingBlock(currentBlock.x, currentBlock.y, currentBlock.w, currentBlock.h);
  }

  // Draw dropping pieces
  dropping.forEach(d => {
    drawDroppingPiece(d.x, d.y, d.w, d.h, d.life);
  });

  // Miss indicators
  if (misses > 0 && gameState === STATE.PLAYING) {
    ctx.fillStyle = '#444';
    ctx.font = '600 11px system-ui';
    ctx.textAlign = 'right';
    const remaining = TAP_CONFIG.maxMisses - misses;
    ctx.fillText(remaining + ' ' + (remaining === 1 ? 'life' : 'lives'), W - 16, 50);
  }
}
</script>
</body>
</html>
