<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tap Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #111;
    font-family: system-ui, -apple-system, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; }

  .screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.4s ease;
  }
  .screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  #start-screen { background: #111; }
  #start-screen h1 {
    font-size: 38px; font-weight: 800; color: #e8e8e8;
    letter-spacing: -0.02em; margin-bottom: 8px;
  }
  #start-screen p {
    font-size: 14px; color: #555; margin-bottom: 36px;
    letter-spacing: 0.04em;
  }

  #end-screen {
    background: rgba(0,0,0,0.92); display: none;
    opacity: 0;
  }
  #end-screen.show {
    display: flex !important;
    animation: fadeSlideIn 0.5s ease forwards;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #end-screen h2 {
    font-size: 13px; color: #555; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  #final-score {
    font-size: 64px; font-weight: 800; color: #e8e8e8;
    letter-spacing: -0.03em; margin-bottom: 6px;
    line-height: 1;
  }
  #end-screen .subtitle {
    color: #444; font-size: 13px; margin-bottom: 32px;
    letter-spacing: 0.02em;
  }

  @keyframes borderPulse {
    0%, 100% { border-color: rgba(232,232,232,0.5); }
    50% { border-color: rgba(232,232,232,1); }
  }
  .btn-primary {
    padding: 14px 45px; font-size: 18px; font-weight: 800;
    border: 2px solid rgba(232,232,232,0.5); border-radius: 50px; cursor: pointer;
    background: transparent; color: #e8e8e8;
    letter-spacing: 0.06em;
    animation: borderPulse 2.5s ease-in-out infinite;
    transition: background 0.2s, color 0.2s;
  }
  .btn-primary:active {
    background: #e8e8e8; color: #111;
  }
  .btn-cta {
    padding: 14px 45px; font-size: 16px; font-weight: 800;
    border: 2px solid #e8e8e8; border-radius: 50px; cursor: pointer;
    background: #e8e8e8; color: #111;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .btn-cta:active { opacity: 0.85; }
  .btn-secondary {
    padding: 10px 35px; font-size: 13px; font-weight: 700;
    border: 1px solid #444; border-radius: 50px;
    cursor: pointer; background: transparent; color: #555;
    letter-spacing: 0.06em;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-secondary:active { border-color: #888; color: #888; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%; padding: 12px 16px;
    display: none; justify-content: space-between; align-items: center;
    z-index: 5;
  }
  #hud .score {
    font-size: 20px; font-weight: 800; color: #e8e8e8;
    letter-spacing: -0.02em;
    min-width: 36px;
  }
  #hud .progress-bar {
    flex: 1; height: 2px; margin: 0 12px;
    background: #222; border-radius: 1px; overflow: hidden;
  }
  #hud .progress-fill {
    height: 100%; width: 0%; border-radius: 1px;
    background: #555; transition: width 0.3s;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="screen" id="start-screen">
  <h1 id="game-title">Shooter</h1>
  <p id="game-subtitle">Tap to shoot</p>
  <button class="btn-primary" id="play-btn">PLAY</button>
</div>

<div class="screen" id="end-screen">
  <h2>Your Score</h2>
  <div id="final-score">0</div>
  <div class="subtitle">Can you beat this?</div>
  <button class="btn-cta" id="cta-btn">DOWNLOAD NOW</button>
  <button class="btn-secondary" id="retry-btn">PLAY AGAIN</button>
</div>

<div id="hud">
  <div class="score" id="score-display">0</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<canvas id="game"></canvas>

<script>
// =====================================================================
// ENGINE — DO NOT MODIFY
// =====================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const STATE = { MENU: 0, PLAYING: 1, END: 2 };
let gameState = STATE.MENU;
let score = 0;
let elapsed = 0;
let lastTime = 0;

// Input
let input = { x: null, y: null, active: false, tapped: false };
canvas.addEventListener('touchstart', e => { e.preventDefault(); input.active = true; input.x = e.touches[0].clientX; input.y = e.touches[0].clientY; input.tapped = true; }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); input.x = e.touches[0].clientX; input.y = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); input.active = false; });
canvas.addEventListener('mousedown', e => { input.active = true; input.x = e.clientX; input.y = e.clientY; input.tapped = true; });
canvas.addEventListener('mousemove', e => { if (input.active) { input.x = e.clientX; input.y = e.clientY; } });
canvas.addEventListener('mouseup', () => { input.active = false; });
canvas.addEventListener('mouseleave', () => { input.active = false; });

// Screens
document.getElementById('play-btn').addEventListener('click', () => {
  const startScreen = document.getElementById('start-screen');
  startScreen.classList.add('fade-out');
  setTimeout(() => { startScreen.classList.add('hidden'); }, 400);
  document.getElementById('hud').style.display = 'flex';
  gameState = STATE.PLAYING; score = 0; elapsed = 0;
  lastTime = performance.now(); initGame();
});
document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('hud').style.display = 'flex';
  gameState = STATE.PLAYING; score = 0; elapsed = 0;
  lastTime = performance.now(); initGame();
});
document.getElementById('cta-btn').addEventListener('click', () => { alert('→ App Store redirect'); });

function endGame() {
  gameState = STATE.END;
  document.getElementById('hud').style.display = 'none';
  const endScreen = document.getElementById('end-screen');
  endScreen.classList.add('show');
  document.getElementById('final-score').textContent = score;
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  const progress = Math.min(100, (elapsed / SHOOTER_CONFIG.duration) * 100);
  document.getElementById('progress-fill').style.width = progress + '%';
}

// Particles
let particles = [];
function spawnParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 * i) / count;
    const speed = 2.5 + Math.random() * 3.5;
    particles.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, life: 1, size: 3 });
  }
}
function updateParticles() { particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03; }); particles = particles.filter(p => p.life > 0); }
function drawParticles() { particles.forEach(p => { ctx.globalAlpha = p.life * 0.9; ctx.fillStyle = '#bbb'; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); }); ctx.globalAlpha = 1; }

// Floating text
let floats = [];
function spawnFloat(x, y, text) { floats.push({ x, y, text, life: 1, vy: -2, scale: 1.3 }); }
function updateFloats() { floats.forEach(f => { f.y += f.vy; f.life -= 0.025; f.scale += (1 - f.scale) * 0.08; }); floats = floats.filter(f => f.life > 0); }
function drawFloats() {
  floats.forEach(f => {
    ctx.globalAlpha = f.life;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(f.scale, f.scale);
    ctx.fillStyle = '#e8e8e8';
    ctx.font = '800 26px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, 0, 0);
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

// Main loop
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05); lastTime = time;
  ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
  if (gameState === STATE.PLAYING) {
    elapsed += dt; updateGame(dt); updateParticles(); updateFloats(); updateHUD();
    if (elapsed >= SHOOTER_CONFIG.duration) endGame();
  }
  drawGame(); drawParticles(); drawFloats();
  input.tapped = false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// =====================================================================
// TAP-SHOOTER MECHANIC — CONFIGURATION
// =====================================================================

const SHOOTER_CONFIG = {
  duration: 15,                 // Game duration in seconds
  playerSize: 20,               // Player radius
  bulletSpeed: 10,              // Bullet speed (pixels/frame)
  bulletSize: 4,                // Bullet radius
  targetMinSize: 15,            // Min target radius
  targetMaxSize: 30,            // Max target radius
  targetMinSpeed: 1,            // Min target horizontal speed
  targetMaxSpeed: 3,            // Max target horizontal speed
  maxTargets: 5,                // Max targets on screen
  spawnInterval: 0.8,           // Seconds between target spawns
  pointsPerHit: 1,              // Score per target hit
  bonusSize: 12,                // Size threshold for bonus points (small = bonus)
  bonusPoints: 3,               // Bonus score for hitting small targets
};

// =====================================================================
// SHOOTER STATE
// =====================================================================
let player = {};
let bullets = [];
let targets = [];
let spawnTimer = 0;

// =====================================================================
// RESKIN FUNCTIONS — CHANGE VISUALS HERE
// =====================================================================

/* RESKIN: Change player appearance */
function drawPlayer(x, y, size) {
  // Soft glow
  ctx.save();
  const glowGrad = ctx.createRadialGradient(x, y, size * 0.2, x, y, size * 2.2);
  glowGrad.addColorStop(0, 'rgba(200,200,200,0.08)');
  glowGrad.addColorStop(1, 'rgba(200,200,200,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(x, y, size * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Body with radial gradient
  const bodyGrad = ctx.createRadialGradient(x, y - size * 0.15, size * 0.15, x, y, size);
  bodyGrad.addColorStop(0, '#ccc');
  bodyGrad.addColorStop(1, '#777');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();

  // Barrel — refined
  const barrelW = 5;
  const barrelH = 13;
  const barrelGrad = ctx.createLinearGradient(x - barrelW, y - size - barrelH, x + barrelW, y - size - barrelH);
  barrelGrad.addColorStop(0, '#888');
  barrelGrad.addColorStop(0.5, '#aaa');
  barrelGrad.addColorStop(1, '#888');
  ctx.fillStyle = barrelGrad;
  ctx.beginPath();
  ctx.roundRect(x - barrelW / 2, y - size - barrelH, barrelW, barrelH, 2);
  ctx.fill();
  ctx.restore();
}

/* RESKIN: Change bullet appearance */
function drawBullet(x, y, size) {
  // Faint trail glow
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.fillStyle = '#e8e8e8';
  ctx.beginPath();
  ctx.arc(x, y, size * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Bright core
  ctx.globalAlpha = 1;
  const bulletGrad = ctx.createRadialGradient(x, y, 0, x, y, size);
  bulletGrad.addColorStop(0, '#fff');
  bulletGrad.addColorStop(1, '#bbb');
  ctx.fillStyle = bulletGrad;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

/* RESKIN: Change target appearance */
function drawTarget(x, y, size) {
  const pulse = 1 + Math.sin(performance.now() * 0.004) * 0.04;
  const s = size * pulse;

  ctx.save();

  // Soft radial glow
  const glowGrad = ctx.createRadialGradient(x, y, s * 0.3, x, y, s * 1.8);
  glowGrad.addColorStop(0, 'rgba(180,170,160,0.06)');
  glowGrad.addColorStop(1, 'rgba(180,170,160,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(x, y, s * 1.8, 0, Math.PI * 2);
  ctx.fill();

  // Outer ring — more transparent
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y, s, 0, Math.PI * 2);
  ctx.stroke();

  // Filled body
  ctx.globalAlpha = 1;
  const bodyGrad = ctx.createRadialGradient(x, y, 0, x, y, s);
  bodyGrad.addColorStop(0, '#666');
  bodyGrad.addColorStop(1, '#444');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(x, y, s * 0.92, 0, Math.PI * 2);
  ctx.fill();

  // Inner ring — subtle warm tone
  ctx.strokeStyle = 'rgba(200,185,170,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y, s * 0.5, 0, Math.PI * 2);
  ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(200,185,170,0.2)';
  ctx.beginPath();
  ctx.arc(x, y, s * 0.12, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

/* RESKIN: Change aim line appearance */
function drawAimLine(fromX, fromY, toX, toY) {
  ctx.save();
  const grad = ctx.createLinearGradient(fromX, fromY, toX, toY);
  grad.addColorStop(0, 'rgba(255,255,255,0.07)');
  grad.addColorStop(1, 'rgba(255,255,255,0.01)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(toX, toY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

/* RESKIN: Change spawn zone indicator */
function drawSpawnZone() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  ctx.setLineDash([8, 10]);
  ctx.beginPath();
  ctx.moveTo(0, H * 0.15);
  ctx.lineTo(W, H * 0.15);
  ctx.moveTo(0, H * 0.55);
  ctx.lineTo(W, H * 0.55);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// =====================================================================
// CORE LOGIC
// =====================================================================

function createTarget() {
  const cfg = SHOOTER_CONFIG;
  const size = cfg.targetMinSize + Math.random() * (cfg.targetMaxSize - cfg.targetMinSize);
  const speed = cfg.targetMinSpeed + Math.random() * (cfg.targetMaxSpeed - cfg.targetMinSpeed);
  const fromLeft = Math.random() > 0.5;
  return {
    x: fromLeft ? -size : W + size,
    y: H * 0.15 + Math.random() * (H * 0.4),
    size,
    speed: fromLeft ? speed : -speed,
    alive: true,
  };
}

function fireBullet() {
  bullets.push({
    x: player.x,
    y: player.y - SHOOTER_CONFIG.playerSize,
    vy: -SHOOTER_CONFIG.bulletSpeed,
    size: SHOOTER_CONFIG.bulletSize,
    alive: true,
  });
}

function checkBulletTargetCollision(bullet, target) {
  const dx = bullet.x - target.x;
  const dy = bullet.y - target.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < bullet.size + target.size;
}

// =====================================================================
// TEMPLATE FUNCTIONS — FILLED FOR TAP-SHOOTER
// =====================================================================

function initGame() {
  particles = []; floats = []; bullets = []; targets = [];
  spawnTimer = 0;
  player = {
    x: W / 2,
    y: H * 0.85,
    size: SHOOTER_CONFIG.playerSize,
  };
}

function updateGame(dt) {
  const cfg = SHOOTER_CONFIG;

  // Move player to input X
  if (input.active && input.x !== null) {
    player.x += (input.x - player.x) * 0.12;
  }
  player.x = Math.max(cfg.playerSize, Math.min(W - cfg.playerSize, player.x));

  // Fire on tap
  if (input.tapped) {
    fireBullet();
  }

  // Spawn targets
  spawnTimer += dt;
  if (spawnTimer >= cfg.spawnInterval && targets.length < cfg.maxTargets) {
    spawnTimer = 0;
    targets.push(createTarget());
  }

  // Update bullets
  bullets.forEach(b => {
    b.y += b.vy;
    if (b.y < -10) b.alive = false;
  });

  // Update targets
  targets.forEach(t => {
    t.x += t.speed;
    if (t.x < -t.size * 2 || t.x > W + t.size * 2) t.alive = false;
  });

  // Collision detection
  bullets.forEach(b => {
    if (!b.alive) return;
    targets.forEach(t => {
      if (!t.alive) return;
      if (checkBulletTargetCollision(b, t)) {
        b.alive = false;
        t.alive = false;
        const isSmall = t.size <= cfg.bonusSize;
        const points = isSmall ? cfg.bonusPoints : cfg.pointsPerHit;
        score += points;
        spawnParticles(t.x, t.y, 10);
        spawnFloat(t.x, t.y - 20, isSmall ? '+' + cfg.bonusPoints : '+' + cfg.pointsPerHit);
      }
    });
  });

  // Cleanup
  bullets = bullets.filter(b => b.alive);
  targets = targets.filter(t => t.alive);
}

function drawGame() {
  drawSpawnZone();

  // Aim line
  if (gameState === STATE.PLAYING) {
    drawAimLine(player.x, player.y - SHOOTER_CONFIG.playerSize, player.x, 0);
  }

  // Targets
  targets.forEach(t => drawTarget(t.x, t.y, t.size));

  // Bullets
  bullets.forEach(b => drawBullet(b.x, b.y, b.size));

  // Player
  if (gameState === STATE.PLAYING) {
    drawPlayer(player.x, player.y, player.size);
  }
}
</script>
</body>
</html>
