<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Playable Ad</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0a0a;
    font-family: system-ui, sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; }

  .screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.4s ease;
  }
  .screen.fade-out { opacity: 0; pointer-events: none; }

  #start-screen { background: #0a0a0a; }
  #start-screen h1 {
    font-size: 38px; font-weight: 800; color: #e8e8e8;
    letter-spacing: -0.02em; margin-bottom: 10px;
  }
  #start-screen p {
    font-size: 13px; color: #555; margin-bottom: 36px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  #start-screen .play-btn {
    padding: 14px 52px; font-size: 15px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    border: 1.5px dashed rgba(255,255,255,0.2); border-radius: 50px;
    cursor: pointer; background: transparent; color: #e8e8e8;
    transition: border-color 0.3s ease, transform 0.2s ease;
    animation: btnPulse 2.5s ease-in-out infinite;
  }
  #start-screen .play-btn:hover {
    border-color: rgba(255,255,255,0.5); transform: scale(1.04);
  }
  @keyframes btnPulse {
    0%, 100% { border-color: rgba(255,255,255,0.2); }
    50% { border-color: rgba(255,255,255,0.4); }
  }

  #end-screen {
    background: rgba(5,5,5,0.9); display: none;
    opacity: 0; transition: opacity 0.5s ease;
  }
  #end-screen.visible { opacity: 1; }
  #end-screen .end-content {
    display: flex; flex-direction: column; align-items: center;
    transform: translateY(20px); opacity: 0;
    animation: slideUp 0.5s ease 0.15s forwards;
  }
  @keyframes slideUp {
    to { transform: translateY(0); opacity: 1; }
  }
  #end-screen h2 {
    font-size: 13px; color: #555; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  #final-score {
    font-size: 64px; font-weight: 800; color: #e8e8e8;
    letter-spacing: -0.03em; margin-bottom: 6px; line-height: 1;
  }
  #end-screen .subtitle {
    color: #444; font-size: 12px; margin-bottom: 32px;
    letter-spacing: 0.04em;
  }
  .btn-cta {
    padding: 14px 48px; font-size: 14px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    border: 2px solid #e8e8e8; border-radius: 50px; cursor: pointer;
    background: #e8e8e8; color: #0a0a0a;
    margin-bottom: 14px;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .btn-cta:hover { transform: scale(1.04); background: #fff; }
  .btn-secondary {
    padding: 10px 36px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px dashed #333; border-radius: 50px;
    cursor: pointer; background: transparent; color: #555;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .btn-secondary:hover { border-color: #555; color: #888; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%; padding: 14px 18px;
    display: none; justify-content: space-between; align-items: center;
    z-index: 5; pointer-events: none;
  }
  #score-display {
    font-size: 20px; font-weight: 800; color: #e8e8e8;
    letter-spacing: -0.02em;
  }
  #progress-wrap {
    flex: 1; height: 2px; margin: 0 14px;
    background: #1a1a1a; border-radius: 1px; overflow: hidden;
  }
  #progress-fill {
    height: 100%; width: 0%; border-radius: 1px;
    background: #555; transition: width 0.3s ease;
  }
  #timer-display {
    font-size: 12px; font-weight: 600; color: #555;
    letter-spacing: 0.04em;
  }

  #hint {
    position: fixed; bottom: 25%; left: 0; width: 100%;
    text-align: center; z-index: 6; pointer-events: none;
    opacity: 0; transition: opacity 0.5s;
  }
  #hint.visible { opacity: 1; }
  #hint-text { font-size: 13px; color: #444; letter-spacing: 0.06em; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="screen" id="start-screen">
  <h1 id="game-title">Skeleton</h1>
  <p id="game-subtitle">The raw engine</p>
  <button class="play-btn" id="play-btn">PLAY</button>
</div>

<div class="screen" id="end-screen">
  <div class="end-content">
    <h2 id="end-title">Your Score</h2>
    <div id="final-score">0</div>
    <div class="subtitle">The base template</div>
    <button class="btn-cta" id="cta-btn">DOWNLOAD NOW</button>
    <button class="btn-secondary" id="retry-btn">PLAY AGAIN</button>
  </div>
</div>

<div id="hud">
  <div id="score-display">0</div>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
  <div id="timer-display"></div>
</div>

<div id="hint">
  <div id="hint-icon"></div>
  <div id="hint-text"></div>
</div>

<canvas id="game"></canvas>

<script>
// =====================================================================
// PLAYABLE AD ENGINE v3 — MINIMAL SKELETON
// =====================================================================

const GAME_CONFIG = {
  title: '',
  subtitle: '',
  bgColor: '#0a0a0a',
  duration: 0,
  trackLength: 0,
  hintEnabled: false,
  hintIcon: '',
  hintText: '',
  hintDuration: 2,
  ctaUrl: '#',
  ctaText: 'DOWNLOAD',
  adId: '',
  gameId: '',
};

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, scale;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  scale = Math.min(W / 400, H / 700);
}
resize();
window.addEventListener('resize', resize);

const STATE = { MENU: 0, PLAYING: 1, END: 2 };
let gameState = STATE.MENU;
let score = 0;
let elapsed = 0;
let lastTime = 0;
let scrollY = 0;
let frameCount = 0;

let input = {
  x: null, y: null,
  active: false,
  tapX: null, tapY: null, tapped: false,
  startX: null, startY: null,
  swipeDir: null, swipeDist: 0,
};
const SWIPE_THRESHOLD = 30;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  input.active = true;
  input.x = t.clientX; input.y = t.clientY;
  input.tapX = t.clientX; input.tapY = t.clientY;
  input.startX = t.clientX; input.startY = t.clientY;
  input.tapped = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  input.x = e.touches[0].clientX;
  input.y = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  detectSwipe();
  input.active = false;
});

canvas.addEventListener('mousedown', e => {
  input.active = true;
  input.x = e.clientX; input.y = e.clientY;
  input.tapX = e.clientX; input.tapY = e.clientY;
  input.startX = e.clientX; input.startY = e.clientY;
  input.tapped = true;
});
canvas.addEventListener('mousemove', e => { if (input.active) { input.x = e.clientX; input.y = e.clientY; } });
canvas.addEventListener('mouseup', () => { detectSwipe(); input.active = false; });
canvas.addEventListener('mouseleave', () => { input.active = false; });

function detectSwipe() {
  if (input.startX === null || input.x === null) return;
  const dx = input.x - input.startX;
  const dy = input.y - input.startY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < SWIPE_THRESHOLD) return;
  input.swipeDist = dist;
  input.swipeDir = Math.abs(dx) > Math.abs(dy)
    ? (dx > 0 ? 'right' : 'left')
    : (dy > 0 ? 'down' : 'up');
}

function trackEvent(name, data) {
  if (window.AD_ANALYTICS && typeof window.AD_ANALYTICS.track === 'function') {
    window.AD_ANALYTICS.track(name, { adId: GAME_CONFIG.adId, gameId: GAME_CONFIG.gameId, ...data });
  }
}

document.getElementById('game-title').textContent = GAME_CONFIG.title || document.getElementById('game-title').textContent;
document.getElementById('game-subtitle').textContent = GAME_CONFIG.subtitle || document.getElementById('game-subtitle').textContent;
document.getElementById('cta-btn').textContent = GAME_CONFIG.ctaText;

document.getElementById('play-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('cta-btn').addEventListener('click', () => {
  trackEvent('cta_click', { score, elapsed });
  if (GAME_CONFIG.ctaUrl !== '#') window.open(GAME_CONFIG.ctaUrl, '_blank');
});

function startGame() {
  const startScreen = document.getElementById('start-screen');
  startScreen.classList.add('fade-out');
  setTimeout(() => startScreen.classList.add('hidden'), 400);
  const endScreen = document.getElementById('end-screen');
  endScreen.style.display = 'none';
  endScreen.classList.remove('visible');
  document.getElementById('hud').style.display = 'flex';
  gameState = STATE.PLAYING;
  score = 0; elapsed = 0; scrollY = 0; frameCount = 0;
  particles = []; floatingTexts = []; shakeTimer = 0;
  lastTime = performance.now();
  if (GAME_CONFIG.hintEnabled) {
    const hint = document.getElementById('hint');
    hint.classList.add('visible');
    setTimeout(() => hint.classList.remove('visible'), GAME_CONFIG.hintDuration * 1000);
  }
  trackEvent('game_start', {});
  initGame();
}

function endGame() {
  if (gameState === STATE.END) return;
  gameState = STATE.END;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('hint').classList.remove('visible');
  const endScreen = document.getElementById('end-screen');
  endScreen.style.display = 'flex';
  requestAnimationFrame(() => endScreen.classList.add('visible'));
  document.getElementById('final-score').textContent = score;
  trackEvent('game_end', { score, elapsed: elapsed.toFixed(1) });
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  let progress = 0;
  if (GAME_CONFIG.trackLength > 0) progress = Math.min(100, (scrollY / GAME_CONFIG.trackLength) * 100);
  else if (GAME_CONFIG.duration > 0) progress = Math.min(100, (elapsed / GAME_CONFIG.duration) * 100);
  document.getElementById('progress-fill').style.width = progress + '%';
  if (GAME_CONFIG.duration > 0) {
    document.getElementById('timer-display').textContent = Math.max(0, Math.ceil(GAME_CONFIG.duration - elapsed)) + 's';
  }
}

let particles = [];
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const spd = 80 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, decay: 0.6 + Math.random() * 0.8, color, size: 3 + Math.random() * 4 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 400 * dt; p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life) * 0.8;
    ctx.strokeStyle = p.color;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

let floatingTexts = [];
function spawnFloatingText(x, y, text, color, size) {
  floatingTexts.push({ x, y, text, color, size: size || 32, life: 1, vy: -80, scale: 1.3 });
}
function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy * dt; ft.life -= 0.8 * dt;
    ft.scale += (1 - ft.scale) * 8 * dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    ctx.globalAlpha = Math.max(0, ft.life);
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${Math.round(ft.size * ft.scale)}px system-ui`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
}

let shakeTimer = 0;
let shakeIntensity = 0;
function triggerShake(duration, intensity) { shakeTimer = duration; shakeIntensity = intensity || 6; }
function updateShake(dt) { if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt); }

let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(freq, type, dur, vol) {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq || 440;
    gain.gain.setValueAtTime(vol || 0.3, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (dur || 0.2));
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + (dur || 0.2));
  } catch (e) {}
}
function soundGood() { playSound(600, 'sine', 0.15, 0.25); setTimeout(() => playSound(800, 'sine', 0.15, 0.25), 80); }
function soundBad() { playSound(200, 'square', 0.25, 0.2); }
function soundTap() { playSound(400, 'sine', 0.08, 0.15); }

function circlesCollide(x1, y1, r1, x2, y2, r2) { const dx = x1-x2, dy = y1-y2; return dx*dx+dy*dy < (r1+r2)*(r1+r2); }
function pointInRect(px, py, rx, ry, rw, rh) { return px >= rx && px <= rx+rw && py >= ry && py <= ry+rh; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function randomRange(min, max) { return min + Math.random() * (max - min); }

// ==================== BLUEPRINT GRID (skeleton identity) ====================
function drawBlueprintGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 6]);
  const gridStep = 40 * scale;
  for (let x = gridStep; x < W; x += gridStep) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = gridStep; y < H; y += gridStep) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  const m = 20, l = 8;
  ctx.beginPath(); ctx.moveTo(m, m+l); ctx.lineTo(m, m); ctx.lineTo(m+l, m); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-m-l, m); ctx.lineTo(W-m, m); ctx.lineTo(W-m, m+l); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(m, H-m-l); ctx.lineTo(m, H-m); ctx.lineTo(m+l, H-m); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-m-l, H-m); ctx.lineTo(W-m, H-m); ctx.lineTo(W-m, H-m-l); ctx.stroke();
}

// ==================== MAIN LOOP ====================
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  frameCount++;
  ctx.save();
  if (shakeTimer > 0) {
    const i = shakeIntensity * (shakeTimer / 0.3);
    ctx.translate((Math.random()-0.5)*i, (Math.random()-0.5)*i);
  }
  ctx.fillStyle = GAME_CONFIG.bgColor;
  ctx.fillRect(0, 0, W, H);
  drawBlueprintGrid();
  if (gameState === STATE.PLAYING) {
    elapsed += dt;
    if (GAME_CONFIG.duration > 0 && elapsed >= GAME_CONFIG.duration) endGame();
    if (GAME_CONFIG.trackLength > 0 && scrollY >= GAME_CONFIG.trackLength) endGame();
    updateGame(dt);
    updateParticles(dt);
    updateFloatingTexts(dt);
    updateShake(dt);
    updateHUD();
  }
  drawGame();
  drawParticles();
  drawFloatingTexts();
  ctx.restore();
  input.tapped = false;
  input.swipeDir = null;
  input.swipeDist = 0;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// =====================================================================
// GAME LOGIC — SKELETON (wireframe placeholder)
// =====================================================================
function initGame() {}
function updateGame(dt) {}
function drawGame() {
  if (gameState === STATE.MENU || gameState === STATE.END) return;
  const cx = W / 2, cy = H / 2;
  const sz = 60 * scale;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 5]);
  ctx.strokeRect(cx - sz, cy - sz, sz * 2, sz * 2);
  ctx.beginPath(); ctx.arc(cx, cy, sz * 0.6, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - sz, cy); ctx.lineTo(cx + sz, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy - sz); ctx.lineTo(cx, cy + sz); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.font = `${11 * scale}px system-ui`;
  ctx.textAlign = 'center';
  ctx.fillText('IMPLEMENT MECHANIC HERE', cx, cy + sz + 20 * scale);
}
</script>
</body>
</html>
